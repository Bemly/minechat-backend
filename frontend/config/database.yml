# IBM DB2 数据库配置
# 需要安装 IBM Data Server Driver Package (DS Driver)
# macOS: brew tap ibm-db2/ibm_db2 && brew install ibm_db2_dsdriver
default: &default
  adapter: ibm_db
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: MINECHAT_FRONTEND
  username: db2inst1
  hostname: localhost
  port: 50000
  schema: DB2INST1

test:
  <<: *default
  database: MINECHAT_FRONTEND_TEST
  username: db2inst1
  hostname: localhost
  port: 50000
  schema: DB2INST1

production:
  <<: *default
  database: MINECHAT_FRONTEND_PROD
  username: <%= ENV["MINECHAT_FRONTEND_DATABASE_USER"] %>
  password: <%= ENV["MINECHAT_FRONTEND_DATABASE_PASSWORD"] %>
  hostname: <%= ENV["MINECHAT_FRONTEND_DATABASE_HOST"] %>
  port: 50000
  schema: <%= ENV.fetch("MINECHAT_FRONTEND_DATABASE_SCHEMA", "DB2INST1") %>

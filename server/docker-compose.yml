# Minechat Docker Compose
# 用法: cd server && docker compose up -d

services:
  db:
    image: docker.1ms.run/ibmcom/db2:11.5.8.0
    dns:
      - 223.5.5.5
      - 8.8.8.8
    environment:
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: db2inst1
      DBNAME: MINECHAT
      LICENSE: accept
    volumes:
      - db_data:/database
    ports:
      - "50000:50000"
    healthcheck:
      test: ["CMD-SHELL", "sudo -u db2inst1 db2 connect to MINECHAT > /dev/null 2>&1 || echo 'MINECHAT exists'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    privileged: true

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    dns:
      - 223.5.5.5
      - 8.8.8.8
    ports:
      - "6379:6379"

  web:
    build:
      context: .
    dns:
      - 223.5.5.5
      - 8.8.8.8
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
      MINECHAT_DATABASE_HOST: db
      MINECHAT_DATABASE_USER: db2inst1
      MINECHAT_DATABASE_PASSWORD: db2inst1
      MINECHAT_DATABASE_SCHEMA: DB2INST1
    ports:
      - "3000:3000"

volumes:
  db_data:

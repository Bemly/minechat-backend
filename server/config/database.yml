# IBM DB2 数据库配置
# 需要安装 IBM Data Server Driver Package (DS Driver)
# macOS: brew tap ibm-db2/ibm_db2 && brew install ibm_db2_dsdriver
default: &default
  adapter: ibm_db
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: <%= ENV.fetch("MINECHAT_DATABASE_NAME", "MINECHAT") %>
  username: <%= ENV.fetch("MINECHAT_DATABASE_USER", "db2inst1") %>
  password: <%= ENV.fetch("MINECHAT_DATABASE_PASSWORD", "db2inst1") %>
  host: <%= ENV.fetch("MINECHAT_DATABASE_HOST", "localhost") %>
  port: 50000
  schema: <%= ENV.fetch("MINECHAT_DATABASE_SCHEMA", "DB2INST1") %>

test:
  <<: *default
  database: <%= ENV.fetch("MINECHAT_DATABASE_NAME", "MINECHAT") %>
  username: <%= ENV.fetch("MINECHAT_DATABASE_USER", "db2inst1") %>
  password: <%= ENV.fetch("MINECHAT_DATABASE_PASSWORD", "db2inst1") %>
  host: <%= ENV.fetch("MINECHAT_DATABASE_HOST", "localhost") %>
  port: 50000
  schema: <%= ENV.fetch("MINECHAT_DATABASE_SCHEMA", "DB2INST1") %>

production:
  <<: *default
  database: <%= ENV.fetch("MINECHAT_DATABASE_NAME", "MINECHAT") %>
  username: <%= ENV["MINECHAT_DATABASE_USER"] %>
  password: <%= ENV["MINECHAT_DATABASE_PASSWORD"] %>
  host: <%= ENV["MINECHAT_DATABASE_HOST"] %>
  port: 50000
  schema: <%= ENV.fetch("MINECHAT_DATABASE_SCHEMA", "DB2INST1") %>

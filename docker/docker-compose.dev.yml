# Development Docker Compose for Minechat Backend
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  db:
    ports:
      - "50000:50000"

  redis:
    ports:
      - "6379:6379"

  web:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    image: null
    volumes:
      - ../backend:/rails
      - bundle_data:/usr/local/bundle
      - tmp_data:/rails/tmp
      - log_data:/rails/log
      - storage_data:/rails/storage
    ports:
      - "3000:3000"
    command: bin/dev
    tty: true
    stdin_open: true

  sidekiq:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    image: null
    volumes:
      - ../backend:/rails
      - bundle_data:/usr/local/bundle
      - tmp_data:/rails/tmp
      - log_data:/rails/log
      - storage_data:/rails/storage
    command: bundle exec sidekiq
    tty: true
    stdin_open: true

volumes:
  bundle_data:
  tmp_data:
  log_data:
  storage_data:

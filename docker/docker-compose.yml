# Production Docker Compose for Minechat Backend
# Build the image first: docker build -t minechat_backend -f ../backend/Dockerfile ../backend
# Then: docker compose up -d

services:
  db:
    image: ibmcom/db2:latest
    environment:
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: db2inst1
      DBNAME: MINECHAT
      LICENSE: accept
    volumes:
      - db_data:/database
    ports:
      - "50000:50000"
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c \"db2 connect to MINECHAT\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    privileged: true
    networks:
      - minechat

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minechat

  web:
    image: minechat_backend:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
    ports:
      - "3000:80"
    networks:
      - minechat

  sidekiq:
    image: minechat_backend:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
    command: bundle exec sidekiq
    networks:
      - minechat

volumes:
  db_data:
  redis_data:

networks:
  minechat:
    driver: bridge
